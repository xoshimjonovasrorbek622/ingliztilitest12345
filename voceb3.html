let currentSetIndex = 0;
let quizList = [];
let currentIndex = 0;
let score = 0;


const setNames = ["1-100", "101-200", "201-300", "301-400", "401-500","501-600","601-700","701-800","801-900","901-1000","1001-1100","1101-1200","1201-1300","1301-1400","1401-1500","1501-1593"];

const selector = document.getElementById('set-selector');
for(let s = 0; s < allSets.length; s++) {
    let b = document.createElement('button');
    b.className = `btn btn-outline-primary rounded-pill px-4 text-nowrap ${s === 0 ? 'active-set' : ''}`;

    b.textContent = setNames[s];

    b.onclick = () => changeSet(s, b);
    selector.appendChild(b);
}

function changeSet(index, btn) {
    document.querySelectorAll('.btn-outline-primary').forEach(b => b.classList.remove('active-set'));
    if(btn) btn.classList.add('active-set');

    currentSetIndex = index;
    quizList = [...allSets[index]].sort(() => Math.random() - 0.5);
    currentIndex = 0;
    score = 0;
    renderSavol();
}

function renderSavol() {
    if (quizList.length === 0) return;
    const q = quizList[currentIndex];
    document.getElementById('target-word').textContent = q[0];
    document.getElementById('score-label').textContent = `Ball: ${score}`;
    document.getElementById('counter-label').textContent = `${currentIndex + 1} / ${quizList.length}`;
    document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / quizList.length) * 100}%`;

    let wrongOnes = allSets[currentSetIndex].filter(x => x[1] !== q[1]).map(x => x[1]);
    if (wrongOnes.length < 3) wrongOnes = ["xato1", "xato2", "xato3"];

    let opts = [q[1], ...wrongOnes.sort(() => Math.random() - 0.5).slice(0, 3)];
    opts.sort(() => Math.random() - 0.5);

    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    opts.forEach(o => {
        const b = document.createElement('button');
        b.className = 'btn opt-btn';
        b.textContent = o;
        b.onclick = () => check(b, o, q[1]);
        grid.appendChild(b);
    });
    document.getElementById('hint-btn').disabled = false;
}

function check(btn, selected, correct) {
    const allBtns = document.querySelectorAll('.opt-btn');
    allBtns.forEach(b => {
        if(b.textContent === correct) b.classList.add('correct');
        b.disabled = true;
    });
    if(selected === correct) {
        score++;
        btn.classList.add('correct');
    } else {
        btn.classList.add('wrong');
    }
    document.getElementById('score-label').textContent = `Ball: ${score}`;
    document.getElementById('hint-btn').disabled = true;
}

function speak() {
    const word = document.getElementById('target-word').textContent;
    if (!window.speechSynthesis) return;

    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(word);
    msg.lang = 'en-US';
    msg.rate = 0.9;

    const voices = window.speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang.includes('en'));
    if (enVoice) msg.voice = enVoice;

    window.speechSynthesis.speak(msg);
}

document.getElementById('hint-btn').onclick = function() {
    const correct = quizList[currentIndex][1];
    document.querySelectorAll('.opt-btn').forEach(b => {
        if(b.textContent === correct) b.classList.add('correct');
        b.disabled = true;
    });
    this.disabled = true;
};

document.getElementById('next-btn').onclick = () => {
    if(currentIndex < quizList.length - 1) {
        currentIndex++;
        renderSavol();
    } else {
        alert(`Test tugadi! Natija: ${score} / ${quizList.length}`);
        changeSet(currentSetIndex);
    }
};

window.onload = () => {
    changeSet(0);

    window.speechSynthesis.getVoices();
};

const slider = document.getElementById('set-selector');
let isDown = false;
let startX;
let scrollLeft;

slider.addEventListener('mousedown', (e) => {
  isDown = true;
  slider.classList.add('active');
  startX = e.pageX - slider.offsetLeft;
  scrollLeft = slider.scrollLeft;
});

slider.addEventListener('mouseleave', () => {
  isDown = false;
});

slider.addEventListener('mouseup', () => {
  isDown = false;
});

slider.addEventListener('mousemove', (e) => {
  if (!isDown) return;
  e.preventDefault();
  const x = e.pageX - slider.offsetLeft;
  const walk = (x - startX) * 2;
  slider.scrollLeft = scrollLeft - walk;
});
</script>

<script>
let wrongAnswers = 0;

function check(btn, selected, correct) {
    const allBtns = document.querySelectorAll('.opt-btn');
    allBtns.forEach(b => {
        if(b.textContent === correct) b.classList.add('correct');
        b.disabled = true;
    });

    if(selected === correct) {
        score++;
        btn.classList.add('correct');
    } else {
        wrongAnswers++;
        btn.classList.add('wrong');
    }
    document.getElementById('score-label').textContent = `Ball: ${score}`;
    document.getElementById('hint-btn').disabled = true;
}

document.getElementById('next-btn').onclick = () => {
    if(currentIndex < quizList.length - 1) {
        currentIndex++;
        renderSavol();
    } else {
        const modal = document.getElementById('result-modal');
        const emoji = document.getElementById('emoji-display');
        const title = document.getElementById('result-title');

        let percentage = (score / quizList.length) * 100;
        if(percentage >= 90) { emoji.textContent = '🥳'; title.textContent = 'Ajoyib! Mukammal!'; }
        else if(percentage >= 70) { emoji.textContent = '🤩'; title.textContent = 'Juda yaxshi!'; }
        else if(percentage >= 40) { emoji.textContent = '🤔'; title.textContent = 'Yaxshi urinish!'; }
        else { emoji.textContent = '💪'; title.textContent = 'Yana o‘rganing!'; }

        document.getElementById('result-text').innerHTML = `
            <div class="text-success fw-bold fs-3">To‘g‘ri: ${score} ✅</div>
            <div class="text-danger fw-bold fs-3 mb-3">Noto‘g‘ri: ${wrongAnswers} ❌</div>
            <div class="text-muted">Umumiy: ${quizList.length} ta savol</div>
        `;
        modal.style.display = 'flex';
    }
};

function changeSet(index, btn) {
    document.querySelectorAll('.btn-outline-primary').forEach(b => b.classList.remove('active-set'));
    if(btn) btn.classList.add('active-set');

    currentSetIndex = index;
    quizList = [...allSets[index]].sort(() => Math.random() - 0.5);
    currentIndex = 0;
    score = 0;
    wrongAnswers = 0;
    renderSavol();
}
</script>
